<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Caesar</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        font-family: Arial, Helvetica, sans-serif;
        background-image: url("images/background.jpg.webp");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    header{
        width: 100%;
        height: 42px;
        background: #f3f3f3;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 60px;
    }

    .header-color{
        font-family: Georgia, serif;
        font-size: 18px;
        font-weight: normal;
        color: #222;
    }

    .header-backbutton-image{
        position: absolute;
        top: 0;
        right: 0;
        z-index: 999;
    }

    .header-backbutton-image img{
        width: 42px;
        cursor: pointer;
    }

    .header-backbutton-image img:hover{
        opacity: 0.5;
    }
