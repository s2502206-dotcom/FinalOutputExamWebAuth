<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Caesar</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        font-family: Arial, Helvetica, sans-serif;
        background-image: url("images/background.jpg.webp");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    header{
        width: 100%;
        height: 42px;
        background: #f3f3f3;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 60px;
    }

    .header-color{
        font-family: Georgia, serif;
        font-size: 18px;
        font-weight: normal;
        color: #222;
    }

    nav ul{
        display: flex;
        list-style: none;
        gap: 25px;
    }

    nav ul li a{
        text-decoration: none;
        color: navy;
        font-size: 20px;
        font-weight: bold;
    }

    nav ul li a:hover{
        color: navy;
        text-decoration: underline;
    }

    nav ul li:active{
        text-decoration: underline;
        text-decoration-color: navy;
    }

    .container{
        position: relative;
        width: 100%;
        height: 100vh;
    }

    .left-image{
        position: absolute;
        top: 100px;
        left: calc(50% - 370px);
        width: 300px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 28px;
        overflow: hidden;
    }

    .left-image img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 28px;
    }

    .center-box{
        position: absolute;
        top: 200px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 265px;
        background: grey;
        backdrop-filter: blur(5px);
        border-radius: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0.5;
    }

    .center-box h1{
        color: white;
        font-size: 44px;
        font-weight: 900;
        line-height: 1.1;
        text-align: center;
        letter-spacing: 1px;
    }

    .right-image{
        position: absolute;
        top: 100px;
        left: calc(50% + 70px);
        width: 300px;
        height: 500px;
        border-radius: 28px;
        overflow: hidden;
    }

    .right-image img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 28px;
    }

    @media (max-width: 1100px){

        body{
            overflow-y: auto;
        }

        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 50px 20px;
            height: auto;
        }

        .left-image,
        .center-box,
        .right-image{
            position: static;
        }

        .center-box{
            transform: none;
            width: 280px;
            height: 160px;
        }

        .center-box h1{
            font-size: 36px;
        }
    }
</style>
</head>

<body>

<header>
    <div class="header-color">Daniel Caesar</div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="album.html">Album</a></li>
            <li><a href="contacts.html">Contacts</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <div class="left-image">
        <img src="images/daniel caesar left image.jpg" alt="Daniel Caesar">
    </div>

    <div class="center-box">
        <h1>
            DANIEL<br>
            CAESAR
        </h1>
    </div>

    <div class="right-image">
        <img src="images/daniel caesar right image.jpg" alt="Album Cover">
    </div>

</div>

</body>
</html>
